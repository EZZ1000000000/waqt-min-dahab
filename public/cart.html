<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب | ezz</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1f4bd8; --success: #22c55e; --bg: #f8fafc; --text: #111827; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); padding: 20px 5%; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-btn { font-size: 24px; text-decoration: none; color: var(--text); }
        .cart-card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .item { display: flex; gap: 15px; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #eee; margin-bottom: 15px; }
        .item img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
        .item-info h3 { font-size: 16px; font-weight: 700; }
        .item-info p { color: var(--primary); font-weight: 800; margin-top: 5px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; color: #6b7280; }
        .form-input { width: 100%; padding: 12px; border: 1px solid #eef2f7; border-radius: 10px; outline: none; font-size: 15px; }
        .order-summary { display: flex; justify-content: space-between; font-weight: 800; font-size: 18px; margin-top: 20px; padding-top: 15px; border-top: 2px dashed #eee; }
        .submit-btn { width: 100%; background: var(--primary); color: #fff; padding: 18px; border: none; border-radius: 12px; font-weight: 800; font-size: 18px; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 20px rgba(31, 75, 216, 0.2); }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn">→</a>
        <h1 style="font-size: 20px; font-weight: 800;">إتمام الطلب</h1>
    </div>

    <div class="cart-card">
        <div class="item">
            <img src="https://images.unsplash.com/photo-1547996160-81dfa63595dd?auto=format&fit=crop&w=200&q=80">
            <div class="item-info">
                <h3>ساعة Apple Watch Series 9</h3>
                <p>9,500 EGP</p>
            </div>
        </div>
        
        <div class="form-group">
            <label>الاسم بالكامل</label>
            <input type="text" class="form-input" placeholder="أدخل اسمك..." required>
        </div>
        <div class="form-group">
            <label>رقم الموبايل</label>
            <input type="tel" class="form-input" placeholder="01xxxxxxxxx" required>
        </div>
        <div class="form-group">
            <label>العنوان بالتفصيل</label>
            <input type="text" class="form-input" placeholder="المحافظة - المدينة - الشارع..." required>
        </div>

        <div class="order-summary">
            <span>الإجمالي:</span>
            <span>9,500 EGP</span>
        </div>
        
        <p style="font-size: 12px; color: #ef4444; margin-top: 15px; text-align: center; font-weight: 700;">الشحن مجاني لفترة محدودة! 🚚</p>
        
        <button class="submit-btn" onclick="alert('شكراً لطلبك! سيتم التواصل معك قريباً.')">تأكيد الطلب الآن</button>
    </div>
</body>
</html>
