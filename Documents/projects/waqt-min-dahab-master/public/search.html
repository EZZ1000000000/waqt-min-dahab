<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ابحث عن منتجك | ezz</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1f4bd8; --bg: #f8fafc; --text: #111827; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); padding: 20px 5%; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-btn { font-size: 24px; text-decoration: none; color: var(--text); }
        .search-box { background: #fff; border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .search-input { border: none; outline: none; width: 100%; font-size: 16px; font-weight: 600; }
        .results-info { margin-top: 20px; color: #6b7280; font-size: 14px; text-align: center; }
        .empty-state { margin-top: 100px; text-align: center; opacity: 0.5; }
        .empty-state i { font-size: 50px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn">→</a>
        <h1 style="font-size: 20px; font-weight: 800;">البحث</h1>
    </div>

    <div class="search-box">
        <span style="font-size: 20px;">🔍</span>
        <input type="text" class="search-input" placeholder="ابحث عن ساعة، ايربودز..." autofocus>
    </div>

    <div class="empty-state">
        <i>🔍</i>
        <p>ابدأ البحث عن منتجك المفضل</p>
    </div>

    <script>
        // Simple search UI logic could go here
    </script>
</body>
</html>
